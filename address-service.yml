spring:
  application:
    name: address-service
    
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://auth-service:9090/.well-known/jwks.json
          # jwk-set-uri: http://localhost:9090/.well-known/jwks.json

  redis:
    # host: localhost
    host: redis
    port: 6379
  cache:
    type: redis
    redis:
      time-to-live: 600000        # 10 minutes
      cache-null-values: false
      key-prefix: "addressService:"
server:
  port: 8084

# Eureka configuration
# eureka:
#   client:
#     service-url:
#       # defaultZone: http://localhost:8761/eureka/
#       defaultZone: http://service-registry:8761/eureka/
#     register-with-eureka: true
#     fetch-registry: true
#   instance:
#     prefer-ip-address: true


eureka:
  client:
    service-url:
      defaultZone: http://service-registry:8761/eureka
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

  instance:
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 90

# Distributed tracing and Zipkin
management:
  tracing:
    enabled: true
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      # endpoint: http://localhost:9411/api/v2/spans
      endpoint: http://zipkin:9411/api/v2/spans

  # Expose all actuator endpoints
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: always

# Logging configuration
logging:
  level:
    # root: INFO                 # Root default
    # org.springframework: INFO   # Spring framework logs
    # org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    com.jmd.address: TRACE         # your package fully enabled

  pattern:
    level: "%5p [${spring.application.name:}, traceId=%X{traceId:-}, spanId=%X{spanId:-}]"
