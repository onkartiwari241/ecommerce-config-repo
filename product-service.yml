server:
  port: 8081

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://auth-service:9090/.well-known/jwks.json

  data:
    redis:
      host: redis
      port: 6379
      repositories:
        enabled: false

  cache:
    type: redis
    redis:
      time-to-live: 600000
      cache-null-values: false
      key-prefix: "productService:"
  
  cloud:
    openfeign:
      discovery:
        enabled: true
      circuitbreaker:
        enabled: false

eureka:
  client:
    service-url:
      defaultZone: http://service-registry:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 90
    

# Distributed Tracing + Zipkin + Actuator
management:
  tracing:
    enabled: true
    sampling:
      probability: 1.0

  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans

  endpoints:
    web:
      exposure:
        include: '*'

  endpoint:
    health:
      show-details: always
    circuitbreakers:
      enabled: true
    circuitbreakerevents:
      enabled: true

  health:
    circuitbreakers:
      enabled: true

# Feign Configuration
feign:
  httpclient:
    enabled: true
  okhttp:
    enabled: false
  client:
    config:
      INVENTORY-SERVICE:
        connectTimeout: 10000
        readTimeout: 30000
      MEDIA-SERVICE:
        connectTimeout: 10000
        readTimeout: 10000

# -------------------------------
# RESILIENCE4J
# -------------------------------
resilience4j:

  # ================================
  # CIRCUIT BREAKER
  # ================================
  circuitbreaker:

    configs:
      default:
        registerHealthIndicator: true

        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5

        permittedNumberOfCallsInHalfOpenState: 3

        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 5s

        waitDurationInOpenState: 10s
        automaticTransitionFromOpenToHalfOpenEnabled: true

        recordExceptions:
          - feign.FeignException
          - feign.RetryableException
          - java.io.IOException
          - java.net.ConnectException
          - java.net.SocketTimeoutException
          - java.util.concurrent.TimeoutException
          - org.springframework.web.client.ResourceAccessException
          - org.springframework.web.client.HttpServerErrorException
          - com.jmd.common.exception.ServiceException
          - com.jmd.common.exception.ServiceUnavailableException
          - com.jmd.common.exception.ClientNullException

        ignoreExceptions:
          - com.jmd.common.exception.BadRequestException
          - com.jmd.common.exception.ResourceNotFoundException
          - com.jmd.common.exception.AccessDeniedException
          - com.jmd.common.exception.ConflictException
          - com.jmd.common.exception.ValidateException

    instances:
      address-service-cb:
        baseConfig: default
      inventory-service-cb:
        baseConfig: default
      media-service-cb:
        baseConfig: default
      category-service-cb:
        baseConfig: default

  timelimiter:
    instances:
      media-service-cb:
        timeoutDuration: 6s
      address-service-cb:
        timeoutDuration: 3s
      category-service-cb:
        timeoutDuration: 3s
      inventory-service-cb:
        timeoutDuration: 3s

  # ================================
  # RETRY
  # ================================
  retry:

    configs:
      default:
        maxAttempts: 3
        waitDuration: 2s

        retryExceptions:
          - feign.FeignException
          - feign.RetryableException
          - java.io.IOException
          - java.net.ConnectException
          - java.net.SocketTimeoutException
          - java.util.concurrent.TimeoutException
          - org.springframework.web.client.ResourceAccessException
          - org.springframework.web.client.HttpServerErrorException
          - com.jmd.common.exception.ServiceException
          - com.jmd.common.exception.ServiceUnavailableException
          - com.jmd.common.exception.ClientNullException

        ignoreExceptions:
          - com.jmd.common.exception.BadRequestException
          - com.jmd.common.exception.ResourceNotFoundException
          - com.jmd.common.exception.AccessDeniedException
          - com.jmd.common.exception.ConflictException
          - com.jmd.common.exception.ValidateException

    instances:
      address-service-retry:
        baseConfig: default
      inventory-service-retry:
        baseConfig: default
      media-service-retry:
        baseConfig: default
      category-service-retry:
        baseConfig: default

  # ================================
  # RATE LIMITER
  # ================================
  ratelimiter:

    configs:
      default:
        limitForPeriod: 10
        limitRefreshPeriod: 10s
        timeoutDuration: 1s

    instances:
      address-service-rl:
        baseConfig: default
      inventory-service-rl:
        baseConfig: default
      media-service-rl:
        baseConfig: default
      category-service-rl:
        baseConfig: default

# -------------------------------
# LOGGING
# -------------------------------
logging:
  level:
    com.jmd.product: DEBUG
    feign.Logger: DEBUG
    org.springframework.cloud.openfeign: INFO

# logging:
  pattern:
    level: "%5p [${spring.application.name}, correlationId=%X{correlationId:-}]"

  # pattern:
  #   level: "%5p [${spring.application.name}, traceId=%X{traceId:-}, spanId=%X{spanId:-}]"
