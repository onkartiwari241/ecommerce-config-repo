server:
  port: 9090
  forward-headers-strategy: framework

spring:
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
            redirect-uri: "https://ayodhyamartstore.in/login/oauth2/code/google"

# =====================================================
# 🔹 EUREKA CONFIG
# =====================================================
# eureka:
#   client:
#     register-with-eureka: true
#     fetch-registry: true
#     service-url:
#       # defaultZone: http://localhost:8761/eureka
#       defaultZone: http://service-registry:8761/eureka

eureka:
  client:
    service-url:
      defaultZone: http://service-registry:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 90


# =====================================================
# 🔹 JWT CONFIG (RSA + JWKS)
# =====================================================
jwt:
  issuer: jmd-auth-service
  access-expiration-minutes: 30
  refresh-expiration-days: 30
  private-key: classpath:keys/rsa-private.pem
  public-key: classpath:keys/rsa-public.pem
  key-id: jmd-auth-key-01

# =========================
# FEIGN CONFIG
# =========================
feign:
  httpclient:
    enabled: true
  okhttp:
    enabled: false
  client:
    config:
      USER-SERVICE:
        connectTimeout: 5000
        readTimeout: 20000
      NOTIFICATION-SERVICE:
        connectTimeout: 5000
        readTimeout: 20000

# =========================
# ACTUATOR + TRACING
# =========================
management:
  tracing:
    enabled: true
    sampling:
      probability: 1.0

  zipkin:
    tracing:
      # endpoint: http://localhost:9411/api/v2/spans
      endpoint: http://zipkin:9411/api/v2/spans

  endpoints:
    web:
      exposure:
        include: '*'

  endpoint:
    health:
      show-details: always
    circuitbreakers:
      enabled: true
    circuitbreakerevents:
      enabled: true

  health:
    circuitbreakers:
      enabled: true

# =========================
# LOGGING
# =========================
logging:
  level:
    com.jmd.authservice: DEBUG
    feign.Logger: DEBUG
    org.springframework.cloud.openfeign: INFO

  pattern:
    level: "%5p [${spring.application.name}, traceId=%X{traceId:-}, spanId=%X{spanId:-}]"

# =====================================================
# 🔥 RESILIENCE4J CONFIGURATION
# =====================================================
# =========================
# RESILIENCE4J
# =========================
resilience4j:

  # ================================
  # CIRCUIT BREAKER
  # ================================
  circuitbreaker:

    configs:
      default:
        registerHealthIndicator: true

        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5

        permittedNumberOfCallsInHalfOpenState: 3

        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 2s

        waitDurationInOpenState: 10s
        automaticTransitionFromOpenToHalfOpenEnabled: true

        recordExceptions:
          - feign.FeignException
          - feign.RetryableException
          - java.io.IOException
          - java.net.ConnectException
          - java.net.SocketTimeoutException
          - java.util.concurrent.TimeoutException
          - org.springframework.web.client.ResourceAccessException
          - org.springframework.web.client.HttpServerErrorException
          - com.jmd.common.exception.ServiceException
          - com.jmd.common.exception.ServiceUnavailableException
          - com.jmd.common.exception.ClientNullException
          - com.jmd.common.exception.ClientRegistrationException

        ignoreExceptions:
          - com.jmd.common.exception.BadRequestException
          - com.jmd.common.exception.ResourceNotFoundException
          - com.jmd.common.exception.AccessDeniedException
          - com.jmd.common.exception.ConflictException
          - com.jmd.common.exception.ValidateException
          - com.jmd.authservice.exception.AuthException
          - com.jmd.authservice.exception.TokenException
          - com.jmd.authservice.exception.RateLimitException

    instances:
      user-service-cb:
        baseConfig: default
      notification-service-cb:
        baseConfig: default

  # ================================
  # RETRY
  # ================================
  retry:

    configs:
      default:
        maxAttempts: 3
        waitDuration: 2s

        retryExceptions:
          - feign.FeignException
          - feign.RetryableException
          - java.io.IOException
          - java.net.ConnectException
          - java.net.SocketTimeoutException
          - java.util.concurrent.TimeoutException
          - org.springframework.web.client.ResourceAccessException
          - org.springframework.web.client.HttpServerErrorException
          - com.jmd.common.exception.ServiceException
          - com.jmd.common.exception.ServiceUnavailableException
          - com.jmd.common.exception.ClientNullException

        ignoreExceptions:
          - com.jmd.common.exception.BadRequestException
          - com.jmd.common.exception.ResourceNotFoundException
          - com.jmd.common.exception.AccessDeniedException
          - com.jmd.common.exception.ConflictException
          - com.jmd.common.exception.ValidateException
          - com.jmd.authservice.exception.AuthException
          - com.jmd.authservice.exception.TokenException
          - com.jmd.authservice.exception.RateLimitException

    instances:
      user-service-retry:
        baseConfig: default
      notification-service-retry:
        baseConfig: default

  # ================================
  # RATE LIMITER
  # ================================
  ratelimiter:

    configs:
      default:
        limitForPeriod: 10
        limitRefreshPeriod: 10s
        timeoutDuration: 1s

    instances:
      user-service-rl:
        baseConfig: default
      notification-service-rl:
        baseConfig: default
