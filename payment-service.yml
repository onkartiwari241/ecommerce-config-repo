
spring:
  application:
    name: payment-service
    
  security:
    oauth2:
      resourceserver:
        jwt:
          # jwk-set-uri: http://auth-service/.well-known/jwks.json
          jwk-set-uri: http://localhost:9090/.well-known/jwks.json

razorpay:
  key: ${RAZORPAY_KEY}
  secret: ${RAZORPAY_SECRET}
  webhook-secret: ${RAZORPAY_WEBHOOK_SECRET

  # -----  Redis configuration  ----
  redis:
    host: localhost
    port: 6379
  cache:
    type: redis
    redis:
      time-to-live: 600000        # 10 minutes
      cache-null-values: false
      key-prefix: "paymentService:"

server:
  port: 9292

# --- Eureka configuration ---
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    register-with-eureka: true
    fetch-registry: true

# --- Distributed tracing, Zipkin, and Actuator ---
management:
  tracing:
    enabled: true
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: always

# ✅ ✅ --- LOGGING WITH TRACE ID + SPAN ID + ALL LEVELS ENABLED ---
logging:
  level:
    # root: TRACE
    # org.springframework: TRACE
    # org.springframework.web: TRACE
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    com.jmd.payment: TRACE   # your package fully enabled

  pattern:
    level: "%5p [${spring.application.name}, traceId=%X{traceId:-}, spanId=%X{spanId:-}]"

# --- Resilience4J Configuration ---
resilience4j:
  circuitbreaker:
    instances:
      ORDER-SERVICE:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 3
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 2s
        waitDurationInOpenState: 10s
        automaticTransitionFromOpenToHalfOpenEnabled: true

        recordExceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException
          - org.springframework.web.client.HttpServerErrorException
          - org.springframework.web.client.ResourceAccessException
          - com.jmd.payment.exception.ServiceUnavailableException
          - com.jmd.payment.exception.PaymentGatewayException

        ignoreExceptions:
          - com.jmd.payment.exception.BadRequestException
          - com.jmd.payment.exception.PaymentValidationException
          - com.jmd.payment.exception.PaymentNotFoundException

  retry:
    instances:
      ORDER-SERVICE:
        maxAttempts: 3
        waitDuration: 2s

        retryExceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException
          - org.springframework.web.client.ResourceAccessException
          - com.jmd.payment.exception.ServiceUnavailableException

        ignoreExceptions:
          - com.jmd.payment.exception.BadRequestException
          - com.jmd.payment.exception.PaymentValidationException

  ratelimiter:
    instances:
      ORDER-SERVICE:
        limitForPeriod: 5
        limitRefreshPeriod: 10s
        timeoutDuration: 1s
