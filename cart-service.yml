server:
  port: 8088


spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://auth-service:9090/.well-known/jwks.json

  data:
    redis:
      host: redis
      port: 6379
      repositories:
        enabled: false

  cache:
    type: redis
    redis:
      time-to-live: 600000
      cache-null-values: false
      key-prefix: "cartService:"


      
  
