spring:
  cloud:
    config:
      fail-fast: true
      retry:
        max-attempts: 50
        initial-interval: 3000
        multiplier: 1.5
        max-interval: 15000
      request-read-timeout: 5000
      request-connect-timeout: 5000

    gateway:
      routes:

        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/v1/users/**

        - id: product-service
          uri: lb://PRODUCT-SERVICE
          predicates:
            - Path=/api/v1/products/**

        # V2 catalog (MasterProduct/ProductVariant/VendorOffer) — added because these paths
        # had no route at all, so every /api/v2/admin, /api/v2/vendor, /api/v2/catalog
        # request 404'd at the gateway ("No static resource ..."), even though
        # product-service itself correctly maps them.
        - id: product-service-v2
          uri: lb://PRODUCT-SERVICE
          predicates:
            - Path=/api/v2/admin/**,/api/v2/vendor/**,/api/v2/catalog/**

        - id: order-service-orders
          uri: lb://ORDER-SERVICE
          predicates:
            - Path=/api/v1/orders/**

        - id: order-service-admin
          uri: lb://ORDER-SERVICE
          predicates:
            - Path=/api/v1/admin/**

        - id: notification-service
          uri: lb://NOTIFICATION-SERVICE
          predicates:
            - Path=/api/v1/notifications/**

        - id: inventory-service
          uri: lb://INVENTORY-SERVICE
          predicates:
            - Path=/api/v1/inventory/**

        # V2 inventory (InventoryController) — same missing-route bug as product-service-v2
        # above, on a different downstream service. Kept as its own scoped route (rather
        # than folding into a blanket /api/v2/** rule) so it can never shadow or be
        # shadowed by product-service-v2.
        - id: inventory-service-v2
          uri: lb://INVENTORY-SERVICE
          predicates:
            - Path=/api/v2/inventory/**

        - id: category-service
          uri: lb://CATEGORY-SERVICE
          predicates:
            - Path=/api/v1/categories/**

        - id: address-service
          uri: lb://ADDRESS-SERVICE
          predicates:
            - Path=/api/v1/address/**

        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth/**

        - id: vendor-service
          uri: lb://VENDOR-SERVICE
          predicates:
            - Path=/api/v1/vendors/**

        - id: cart-service
          uri: lb://CART-SERVICE
          predicates:
            - Path=/api/v1/cart/**

        - id: payment-service
          uri: lb://PAYMENT-SERVICE
          predicates:
            - Path=/api/v1/payments/**

        - id: payment-webhook
          uri: lb://PAYMENT-SERVICE
          predicates:
            - Path=/api/v1/webhooks/**

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS}

# Debug logs only for dev
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: DEBUG
    reactor.netty.http.server: DEBUG
