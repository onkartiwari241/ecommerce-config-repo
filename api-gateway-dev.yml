spring:
  cloud:
    gateway:
      routes:
        # Path=/api/v1/users/** alone does not match the bare /api/v1/users path (no
        # trailing segment) - same missing-route class of bug already fixed below for
        # product-service-v2/inventory-service-v2/order-service-delivery/
        # order-service-vendor-orders. This route specifically needs the bare form too,
        # for the admin "list all users" endpoint (GET /api/v1/users?pageNumber=...),
        # which has no path segment after /users.
        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/v1/users,/api/v1/users/**

        - id: product-service
          uri: lb://PRODUCT-SERVICE
          predicates:
            - Path=/api/v1/products/**

        # V2 catalog (MasterProduct/ProductVariant/VendorOffer) — added because these paths
        # had no route at all, so every /api/v2/admin, /api/v2/vendor, /api/v2/catalog
        # request 404'd at the gateway ("No static resource ..."), even though
        # product-service itself correctly maps them.
        - id: product-service-v2
          uri: lb://PRODUCT-SERVICE
          predicates:
            - Path=/api/v2/admin/**,/api/v2/vendor/**,/api/v2/catalog/**

        - id: order-service
          uri: lb://ORDER-SERVICE
          predicates:
            - Path=/api/v1/orders/**

        - id: order-service
          uri: lb://ORDER-SERVICE
          predicates:
            - Path=/api/v1/admin/**

        # Delivery-boy self-service assignment endpoints (DeliveryAssignmentController) - had
        # no route at all, so /api/v1/delivery/assignments/offered|history 404'd at the gateway
        # even though order-service correctly maps them.
        - id: order-service-delivery
          uri: lb://ORDER-SERVICE
          predicates:
            - Path=/api/v1/delivery/**

        # Vendor order-fulfillment endpoints (VendorOrderFulfillmentController: accept/reject/
        # ready-for-pickup) - same missing-route bug as order-service-delivery above.
        - id: order-service-vendor-orders
          uri: lb://ORDER-SERVICE
          predicates:
            - Path=/api/v1/vendor/orders/**

        - id: notification-service
          uri: lb://NOTIFICATION-SERVICE
          predicates:
            - Path=/api/v1/notifications/**

        - id: inventory-service
          uri: lb://INVENTORY-SERVICE
          predicates:
            - Path=/api/v1/inventory/**

        # V2 inventory (InventoryController) — same missing-route bug as product-service-v2
        # above, on a different downstream service. Kept as its own scoped route (rather
        # than folding into a blanket /api/v2/** rule) so it can never shadow or be
        # shadowed by product-service-v2.
        - id: inventory-service-v2
          uri: lb://INVENTORY-SERVICE
          predicates:
            - Path=/api/v2/inventory/**

        - id: category-service
          uri: lb://CATEGORY-SERVICE
          predicates:
            - Path=/api/v1/categories/**

        - id: address-service
          uri: lb://ADDRESS-SERVICE
          predicates:
            - Path=/api/v1/address/**

        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth/**
          # filters:
          #   - StripPrefix=1


        - id: vendor-service
          uri: lb://VENDOR-SERVICE
          predicates:
            - Path=/api/v1/vendors/**

        - id: cart-service
          uri: lb://CART-SERVICE
          predicates:
            - Path=/api/v1/cart/**

        - id: payment-service
          uri: lb://PAYMENT-SERVICE
          predicates:
            - Path=/api/v1/payments/**

        - id: payment-webhook
          uri: lb://PAYMENT-SERVICE
          predicates:
            - Path=/api/v1/webhooks/**









