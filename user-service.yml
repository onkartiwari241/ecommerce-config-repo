spring:
  application:
    name: user-service
    
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://auth-service:9090/.well-known/jwks.json
          # jwk-set-uri: http://localhost:9090/.well-known/jwks.json

  # -----  Redis configuration  ----
  redis:
    # host: localhost
    host: redis
    port: 6379
    
  data:
    redis:
      repositories:
        enabled: false
        
  cache:
    type: redis
    redis:
      time-to-live: 600000        # 10 minutes
      cache-null-values: false
      key-prefix: "userService:"

server:
  port: 8080

# --- Eureka configuration ---
# eureka:
#   client:
#     service-url:
#       # defaultZone: http://localhost:8761/eureka
#       defaultZone: http://service-registry:8761/eureka
#     register-with-eureka: true
#     fetch-registry: true

eureka:
  client:
    service-url:
      defaultZone: http://service-registry:8761/eureka
    register-with-eureka: true
    fetch-registry: true

  instance:
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 90

# --- Distributed tracing, Zipkin, and Actuator ---
# Distributed tracing and Zipkin
management:
  tracing:
    enabled: true
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      # endpoint: http://localhost:9411/api/v2/spans
      endpoint: http://zipkin:9411/api/v2/spans

  # Expose all actuator endpoints
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: always
    circuitbreakers:
      enabled: true
    circuitbreakerevents:
      enabled: true

  health:
    circuitbreakers:
      enabled: true

feign:
  httpclient:
    enabled: true
  okhttp:
    enabled: false

#  --- LOGGING WITH TRACE ID + SPAN ID + ALL LEVELS ENABLED ---
logging:
  level:
    com.jmd.user: TRACE
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

  pattern:
    level: "%5p [${spring.application.name}, traceId=%X{traceId:-}, spanId=%X{spanId:-}]"

# --- Resilience4J Configuration ---
resilience4j:

  # ================================
  # CIRCUIT BREAKER
  # ================================
  circuitbreaker:

    configs:
      default:
        registerHealthIndicator: true

        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5

        permittedNumberOfCallsInHalfOpenState: 3

        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 2s

        waitDurationInOpenState: 10s
        automaticTransitionFromOpenToHalfOpenEnabled: true

        recordExceptions:
          - feign.FeignException
          - feign.RetryableException
          - java.io.IOException
          - java.net.ConnectException
          - java.net.SocketTimeoutException
          - java.util.concurrent.TimeoutException
          - org.springframework.web.client.ResourceAccessException
          - org.springframework.web.client.HttpServerErrorException
          - com.jmd.common.exception.ServiceException
          - com.jmd.common.exception.ServiceUnavailableException
          - com.jmd.common.exception.ClientNullException

        ignoreExceptions:
          - com.jmd.common.exception.BadRequestException
          - com.jmd.common.exception.ResourceNotFoundException
          - com.jmd.common.exception.AccessDeniedException
          - com.jmd.common.exception.ConflictException
          - com.jmd.common.exception.ValidateException

    instances:
      address-service-cb:
        baseConfig: default
      media-service-cb:
        baseConfig: default
      vendor-service-cb:
        baseConfig: default

  # ================================
  # RETRY
  # ================================
  retry:

    configs:
      default:
        maxAttempts: 3
        waitDuration: 2s

        retryExceptions:
          - feign.FeignException
          - feign.RetryableException
          - java.io.IOException
          - java.net.ConnectException
          - java.net.SocketTimeoutException
          - java.util.concurrent.TimeoutException
          - org.springframework.web.client.ResourceAccessException
          - org.springframework.web.client.HttpServerErrorException
          - com.jmd.common.exception.ServiceException
          - com.jmd.common.exception.ServiceUnavailableException
          - com.jmd.common.exception.ClientNullException

        ignoreExceptions:
          - com.jmd.common.exception.BadRequestException
          - com.jmd.common.exception.ResourceNotFoundException
          - com.jmd.common.exception.AccessDeniedException
          - com.jmd.common.exception.ConflictException
          - com.jmd.common.exception.ValidateException

    instances:
      address-service-retry:
        baseConfig: default
      media-service-retry:
        baseConfig: default
      vendor-service-retry:
        baseConfig: default

  # ================================
  # RATE LIMITER
  # ================================
  ratelimiter:

    configs:
      default:
        limitForPeriod: 10
        limitRefreshPeriod: 10s
        timeoutDuration: 1s

    instances:
      address-service-rl:
        baseConfig: default
      media-service-rl:
        baseConfig: default
      vendor-service-rl:
        baseConfig: default
