spring:
  datasource:
    url: jdbc:mysql://mysql:3307/category_service
    username: root
    password: onkar
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

  cloud:
    config:
      fail-fast: true
      retry:
        max-attempts: 50
        initial-interval: 3000
        multiplier: 1.5
        max-interval: 15000
      request-read-timeout: 5000
      request-connect-timeout: 5000
